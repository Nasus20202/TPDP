<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <title>OpenLayers Map</title>

        <!-- OpenLayers base script -->
        <script src="http://www.openlayers.org/api/OpenLayers.js"></script>
        <script type="text/javascript">
	//<![CDATA[

    var map;
    var mercator = new OpenLayers.Projection("EPSG:900913");
    var geographic = new OpenLayers.Projection("EPSG:4326");
    var markers;
    var fromPoint;
    var toPoint;
    var numClicks = 0;
    var vectorLayer = null;

    var line_style = {
        strokeColor: "#0000EE",
        strokeOpacity: 0.7,
        strokeWidth: 4,
        pointRadius: 6,
        pointerEvents: "visiblePainted"
    };

    // Task 1: addMarker
    function addMarker(lonlat, popupContentHTML) {
        var feature = new OpenLayers.Feature(markers, lonlat);
        feature.closeBox = true;
        feature.popupClass = OpenLayers.Popup.FramedCloud;
        feature.data.popupContentHTML = popupContentHTML;
        feature.data.overflow = "auto";
        var marker = feature.createMarker();
        var markerClick = function (evt) {
            if (this.popup == null) {
                this.popup = this.createPopup(this.closeBox);
                map.addPopup(this.popup);
                this.popup.show();
            } else {
                this.popup.toggle();
            }
            currentPopup = this.popup;
            OpenLayers.Event.stop(evt);
        };
        marker.events.register("mousedown", feature, markerClick);
        markers.addMarker(marker);
    }

    // Task 2: click control
    OpenLayers.Control.Click = OpenLayers.Class(OpenLayers.Control, {
        defaultHandlerOptions: {
            single: true,
            double: false,
            pixelTolerance: 0,
            stopSingle: false,
            stopDouble: false
        },
        initialize: function (options) {
            this.handlerOptions = OpenLayers.Util.extend({}, this.defaultHandlerOptions);
            OpenLayers.Control.prototype.initialize.apply(this, arguments);
            this.handler = new OpenLayers.Handler.Click(this, { click: this.trigger }, this.handlerOptions);
        },
        trigger: function (e) {
            var lonlat = map.getLonLatFromViewPortPx(e.xy);
            numClicks++;
            getLocationData(lonlat.lon, lonlat.lat);
        }
    });

    // Task 3: getLocationData
    function getLocationData(lon, lat) {
        if (numClicks == 1) {
            markers.clearMarkers();
            if (vectorLayer != null) { vectorLayer.destroy(); vectorLayer = null; }
            addMarker(new OpenLayers.LonLat(lon, lat), "Start");
            fromPoint = new OpenLayers.LonLat(lon, lat).transform(mercator, geographic);
        } else if (numClicks == 2) {
            addMarker(new OpenLayers.LonLat(lon, lat), "End");
            toPoint = new OpenLayers.LonLat(lon, lat).transform(mercator, geographic);
            getRoute(fromPoint, toPoint);
            numClicks = 0;
        } else {
            numClicks = 0;
        }
    }

    // Task 4: getRoute via OSRM, then draw polyline from GeoJSON
    function getRoute(fromPoint, toPoint) {
        var url = "https://router.project-osrm.org/route/v1/driving/"
            + fromPoint.lon + "," + fromPoint.lat + ";"
            + toPoint.lon   + "," + toPoint.lat
            + "?geometries=geojson&overview=full";

        var request = new XMLHttpRequest();
        request.onreadystatechange = function () {
            if (this.readyState == 4 && this.status == 200) {
                var data = JSON.parse(request.responseText);
                var coords = data.routes[0].geometry.coordinates;
                getRoutePolyline(coords);
            }
        };
        request.open("GET", url, true);
        request.send();
    }

    function getRoutePolyline(coords) {
        if (vectorLayer != null) { vectorLayer.destroy(); vectorLayer = null; }

        // Convert GeoJSON [lon,lat] array to OpenLayers points in Mercator
        var points = coords.map(function (c) {
            return new OpenLayers.Geometry.Point(c[0], c[1])
                .transform(geographic, mercator);
        });

        var line = new OpenLayers.Geometry.LineString(points);
        var feature = new OpenLayers.Feature.Vector(line, null, line_style);

        vectorLayer = new OpenLayers.Layer.Vector("Routes");
        vectorLayer.addFeatures([feature]);
        map.addLayer(vectorLayer);
        map.setLayerIndex(vectorLayer, map.getLayerIndex(markers) - 1);
    }

    function init() {
        var options = {
            projection: mercator,
            displayProjection: geographic,
            units: "m",
            maxResolution: 156543.0339,
            maxExtent: new OpenLayers.Bounds(-20037508.34, -20037508.34, 20037508.34, 20037508.34)
        };
        map = new OpenLayers.Map('map', options);

        var osm = new OpenLayers.Layer.OSM();
        markers = new OpenLayers.Layer.Markers("points");

        map.addLayer(osm);
        map.addLayer(markers);
        map.addControl(new OpenLayers.Control.LayerSwitcher());
        map.addControl(new OpenLayers.Control.MousePosition());
        map.setCenter(new OpenLayers.LonLat(19.9, 50.0).transform(geographic, mercator), 7);

        addMarker(new OpenLayers.LonLat(19.9, 50.0).transform(geographic, mercator), "Kraków");

        var click = new OpenLayers.Control.Click();
        map.addControl(click);
        click.activate();
    }

	//]]>
        </script>
        <style>
            html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
        </style>
    </head>
    <body onload="init()">
        <div id="map"></div>
    </body>
</html>
